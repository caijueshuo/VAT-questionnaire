<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>配套费税务口径调研 | 财觉说</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #faf3e0;  /* 香槟金背景基调 */
            font-family: 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            line-height: 1.55;
            color: #2c3e2f;
            padding: 32px 20px 50px;
        }

        .survey-container {
            max-width: 780px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }

        .header {
            background: #d9c8a9;  /* 香槟色系深一度 */
            padding: 24px 28px;
            color: #2c3e2f;
            border-bottom: 1px solid #e9dbbc;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: -0.2px;
        }
        .header p {
            font-size: 15px;
            opacity: 0.8;
        }

        .form-content {
            padding: 28px 28px 36px;
        }

        .form-group {
            margin-bottom: 28px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 16px;
            color: #3a5a3e;
            margin-bottom: 8px;
        }
        .required {
            color: #b86b4a;
            font-weight: normal;
            font-size: 14px;
        }
        select, input, textarea {
            width: 100%;
            padding: 12px 15px;
            font-size: 15px;
            border: 1px solid #e2d5bc;
            border-radius: 20px;
            background: #fffef8;
            transition: 0.2s;
            font-family: inherit;
        }
        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: #b88b4b;
            box-shadow: 0 0 0 3px rgba(184, 139, 75, 0.1);
        }
        .double-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .double-group .form-group {
            flex: 1;
            min-width: 180px;
        }
        .radio-group {
            background: #fefbf5;
            padding: 14px 18px;
            border-radius: 24px;
            border: 1px solid #efe3cd;
            margin-top: 6px;
        }
        .radio-option {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            align-items: center;
        }
        .radio-option label {
            font-weight: normal;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 15px;
            margin-bottom: 0;
        }
        .radio-option input {
            width: auto;
            margin-right: 2px;
        }
        .hint-text {
            font-size: 13px;
            color: #7b6b4c;
            margin-top: 8px;
            background: #fef8ef;
            padding: 6px 12px;
            border-radius: 16px;
        }
        .btn-submit {
            background: #b88b4b;
            color: white;
            width: 100%;
            border: none;
            padding: 14px;
            font-size: 17px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 16px;
            font-family: inherit;
        }
        .btn-submit:hover {
            background: #9e6f3a;
            transform: translateY(-1px);
        }
        .success-msg {
            background: #e8e0cf;
            padding: 14px;
            border-radius: 24px;
            text-align: center;
            margin-top: 24px;
            color: #5e4b2b;
            font-weight: 500;
            display: none;
        }
        hr {
            margin: 20px 0;
            border: none;
            height: 1px;
            background: #e9e0cf;
        }
        .footnote {
            font-size: 12px;
            color: #9b8a6c;
            text-align: center;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #ede3d2;
        }
        @media (max-width: 600px) {
            .form-content { padding: 20px; }
            .double-group { flex-direction: column; gap: 0; }
            .radio-option { flex-direction: column; align-items: flex-start; gap: 10px; }
        }
    </style>
</head>
<body>
<div class="survey-container">
    <div class="header">
        <h1>全国配套费税务口径专业调研</h1>
        <p>增值税差额扣除 · 土地增值税加计扣除 | 匿名统计</p>
    </div>
    <div class="form-content">
        <form id="surveyForm">
            <div class="double-group">
                <div class="form-group">
                    <label>省份 <span class="required">*</span></label>
                    <select id="province" required>
                        <option value="" disabled selected>—— 请选择省份 ——</option>
                        <option value="北京市">北京市</option><option value="天津市">天津市</option><option value="上海市">上海市</option><option value="重庆市">重庆市</option>
                        <option value="河北省">河北省</option><option value="山西省">山西省</option><option value="辽宁省">辽宁省</option><option value="吉林省">吉林省</option>
                        <option value="黑龙江省">黑龙江省</option><option value="江苏省">江苏省</option><option value="浙江省">浙江省</option><option value="安徽省">安徽省</option>
                        <option value="福建省">福建省</option><option value="江西省">江西省</option><option value="山东省">山东省</option><option value="河南省">河南省</option>
                        <option value="湖北省">湖北省</option><option value="湖南省">湖南省</option><option value="广东省">广东省</option><option value="海南省">海南省</option>
                        <option value="四川省">四川省</option><option value="贵州省">贵州省</option><option value="云南省">云南省</option><option value="陕西省">陕西省</option>
                        <option value="甘肃省">甘肃省</option><option value="青海省">青海省</option><option value="内蒙古自治区">内蒙古自治区</option><option value="广西壮族自治区">广西壮族自治区</option>
                        <option value="西藏自治区">西藏自治区</option><option value="宁夏回族自治区">宁夏回族自治区</option><option value="新疆维吾尔自治区">新疆维吾尔自治区</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>城市 <span class="required">*</span></label>
                    <select id="citySelect" required>
                        <option value="" disabled selected>—— 请先选择省份 ——</option>
                    </select>
                    <div style="margin-top: 6px;">
                        <input type="text" id="cityOther" placeholder="若以上列表无您的城市，请在此填写" style="margin-top: 6px;">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>配套费能否抵减增值税销售额？ <span class="required">*</span></label>
                <div class="radio-group">
                    <div class="radio-option">
                        <label><input type="radio" name="vatDeduction" value="可以抵减" required> 可以抵减</label>
                        <label><input type="radio" name="vatDeduction" value="不可以抵减"> 不可以抵减</label>
                        <label><input type="radio" name="vatDeduction" value="口径不明/未明确"> 口径不明 / 未明确</label>
                    </div>
                </div>
                <div class="hint-text">一般计税项目，配套费是否允许在增值税销售额中差额扣除（依据2026年10号公告等）</div>
            </div>

            <div class="form-group">
                <label>配套费在土地增值税清算中能否加计20%扣除？ <span class="required">*</span></label>
                <div class="radio-group">
                    <div class="radio-option">
                        <label><input type="radio" name="landVatAdd" value="可以加计扣除" required> 可以加计20%扣除</label>
                        <label><input type="radio" name="landVatAdd" value="只能据实扣除不能加计"> 只能据实扣除，不能加计</label>
                        <label><input type="radio" name="landVatAdd" value="口径不明/未明确"> 口径不明 / 未明确</label>
                    </div>
                </div>
                <div class="hint-text">依据各地土地增值税清算政策（如苏地税规〔2012〕1号、安徽省税务局公告2018年第21号等）</div>
            </div>

            <div class="form-group">
                <label>补充说明（含政策文号 / 官方答复）</label>
                <textarea id="remark" rows="3" placeholder="示例：江苏省苏地税规〔2012〕1号明确不得加计扣除；安徽省税务局公告2018年第21号允许配套费列入开发成本加计扣除；当地12366明确不可抵减增值税…"></textarea>
                <div class="hint-text">如能提供具体政策文号或官方文件，将极大提升调研价值，感谢您的专业分享</div>
            </div>

            <button type="button" class="btn-submit" id="submitBtn">提交调研结果</button>
            <div id="successMsg" class="success-msg"></div>
        </form>
        <div class="footnote">
            * 本调研仅用于行业研究及实务交流，所有数据匿名汇总。<br>
            财觉说将定期发布全国口径分析报告，感谢每一位参与者的贡献。
        </div>
    </div>
</div>

<script>
    (function() {
        // 城市数据库（主要地级市）
        const cityMap = {
            "北京市": ["北京市"], "天津市": ["天津市"], "上海市": ["上海市"], "重庆市": ["重庆市"],
            "河北省": ["石家庄市", "唐山市", "秦皇岛市", "邯郸市", "邢台市", "保定市", "张家口市", "承德市", "沧州市", "廊坊市", "衡水市"],
            "山西省": ["太原市", "大同市", "阳泉市", "长治市", "晋城市", "朔州市", "晋中市", "运城市", "忻州市", "临汾市", "吕梁市"],
            "辽宁省": ["沈阳市", "大连市", "鞍山市", "抚顺市", "本溪市", "丹东市", "锦州市", "营口市", "阜新市", "辽阳市", "盘锦市", "铁岭市", "朝阳市", "葫芦岛市"],

            "江苏省": ["南京市", "无锡市", "徐州市", "常州市", "苏州市", "南通市", "连云港市", "淮安市", "盐城市", "扬州市", "镇江市", "泰州市", "宿迁市"],
            "浙江省": ["杭州市", "宁波市", "温州市", "嘉兴市", "湖州市", "绍兴市", "金华市", "衢州市", "舟山市", "台州市", "丽水市"],
            "安徽省": ["合肥市", "芜湖市", "蚌埠市", "淮南市", "马鞍山市", "淮北市", "铜陵市", "安庆市", "黄山市", "滁州市", "阜阳市", "宿州市", "六安市", "亳州市", "池州市", "宣城市"],
            "福建省": ["福州市", "厦门市", "莆田市", "三明市", "泉州市", "漳州市", "南平市", "龙岩市", "宁德市"],
            "江西省": ["南昌市", "景德镇市", "萍乡市", "九江市", "新余市", "鹰潭市", "赣州市", "吉安市", "宜春市", "抚州市", "上饶市"],
            "山东省": ["济南市", "青岛市", "淄博市", "枣庄市", "东营市", "烟台市", "潍坊市", "济宁市", "泰安市", "威海市", "日照市", "临沂市", "德州市", "聊城市", "滨州市", "菏泽市"],
            "河南省": ["郑州市", "开封市", "洛阳市", "平顶山市", "安阳市", "鹤壁市", "新乡市", "焦作市", "濮阳市", "许昌市", "漯河市", "三门峡市", "南阳市", "商丘市", "信阳市", "周口市", "驻马店市"],
            "湖北省": ["武汉市", "黄石市", "十堰市", "宜昌市", "襄阳市", "鄂州市", "荆门市", "孝感市", "荆州市", "黄冈市", "咸宁市", "随州市", "恩施土家族苗族自治州"],
            "湖南省": ["长沙市", "株洲市", "湘潭市", "衡阳市", "邵阳市", "岳阳市", "常德市", "张家界市", "益阳市", "郴州市", "永州市", "怀化市", "娄底市", "湘西土家族苗族自治州"],
            "广东省": ["广州市", "深圳市", "珠海市", "汕头市", "佛山市", "韶关市", "湛江市", "肇庆市", "江门市", "茂名市", "惠州市", "梅州市", "汕尾市", "河源市", "阳江市", "清远市", "东莞市", "中山市", "潮州市", "揭阳市", "云浮市"],
            "海南省": ["海口市", "三亚市", "三沙市", "儋州市", "五指山市", "琼海市", "文昌市", "万宁市", "东方市"],
            "四川省": ["成都市", "自贡市", "攀枝花市", "泸州市", "德阳市", "绵阳市", "广元市", "遂宁市", "内江市", "乐山市", "南充市", "眉山市", "宜宾市", "广安市", "达州市", "雅安市", "巴中市", "资阳市", "阿坝藏族羌族自治州", "甘孜藏族自治州", "凉山彝族自治州"],
            "贵州省": ["贵阳市", "六盘水市", "遵义市", "安顺市", "毕节市", "铜仁市", "黔西南布依族苗族自治州", "黔东南苗族侗族自治州", "黔南布依族苗族自治州"],
            "云南省": ["昆明市", "曲靖市", "玉溪市", "保山市", "昭通市", "丽江市", "普洱市", "临沧市", "楚雄彝族自治州", "红河哈尼族彝族自治州", "文山壮族苗族自治州", "西双版纳傣族自治州", "大理白族自治州", "德宏傣族景颇族自治州", "怒江傈僳族自治州", "迪庆藏族自治州"],
            "陕西省": ["西安市", "铜川市", "宝鸡市", "咸阳市", "渭南市", "延安市", "汉中市", "榆林市", "安康市", "商洛市"],
            "甘肃省": ["兰州市", "嘉峪关市", "金昌市", "白银市", "天水市", "武威市", "张掖市", "平凉市", "酒泉市", "庆阳市", "定西市", "陇南市", "临夏回族自治州", "甘南藏族自治州"],
            "青海省": ["西宁市", "海东市", "海北藏族自治州", "黄南藏族自治州", "海南藏族自治州", "果洛藏族自治州", "玉树藏族自治州", "海西蒙古族藏族自治州"],
            "内蒙古自治区": ["呼和浩特市", "包头市", "乌海市", "赤峰市", "通辽市", "鄂尔多斯市", "呼伦贝尔市", "巴彦淖尔市", "乌兰察布市", "兴安盟", "锡林郭勒盟", "阿拉善盟"],
            "广西壮族自治区": ["南宁市", "柳州市", "桂林市", "梧州市", "北海市", "防城港市", "钦州市", "贵港市", "玉林市", "百色市", "贺州市", "河池市", "来宾市", "崇左市"],
            "西藏自治区": ["拉萨市", "日喀则市", "昌都市", "林芝市", "山南市", "那曲市", "阿里地区"],
            "宁夏回族自治区": ["银川市", "石嘴山市", "吴忠市", "固原市", "中卫市"],
            "新疆维吾尔自治区": ["乌鲁木齐市", "克拉玛依市", "吐鲁番市", "哈密市", "昌吉回族自治州", "博尔塔拉蒙古自治州", "巴音郭楞蒙古自治州", "阿克苏地区", "克孜勒苏柯尔克孜自治州", "喀什地区", "和田地区", "伊犁哈萨克自治州", "塔城地区", "阿勒泰地区"]

        const provinceSelect = document.getElementById('province');
        const citySelect = document.getElementById('citySelect');
        const cityOther = document.getElementById('cityOther');

        function updateCityOptions() {
            const selectedProvince = provinceSelect.value;
            citySelect.innerHTML = '<option value="" disabled selected>—— 请选择城市 ——</option>';
            if (selectedProvince && cityMap[selectedProvince]) {
                cityMap[selectedProvince].forEach(city => {
                    const option = document.createElement('option');
                    option.value = city;
                    option.textContent = city;
                    citySelect.appendChild(option);
                });
            }
            // 清空其他输入框
            cityOther.value = '';
        }

        provinceSelect.addEventListener('change', updateCityOptions);

        // 初始化城市（默认无）
        updateCityOptions();

        // 提交逻辑
        const submitBtn = document.getElementById('submitBtn');
        const successDiv = document.getElementById('successMsg');

        submitBtn.addEventListener('click', function() {
            const province = provinceSelect.value;
            if (!province) {
                alert('请选择省份');
                return;
            }
            let city = '';
            if (citySelect.value && citySelect.value !== "") {
                city = citySelect.value;
            } else if (cityOther.value.trim() !== "") {
                city = cityOther.value.trim();
            } else {
                alert('请从下拉列表选择城市，或在下方的输入框中填写您的城市');
                return;
            }

            const vatRadio = document.querySelector('input[name="vatDeduction"]:checked');
            if (!vatRadio) {
                alert('请选择配套费能否抵减增值税销售额的口径');
                return;
            }
            const landRadio = document.querySelector('input[name="landVatAdd"]:checked');
            if (!landRadio) {
                alert('请选择配套费在土增清算中能否加计扣除的口径');
                return;
            }
            const remark = document.getElementById('remark').value.trim() || '无';

            // 模拟提交（实际可接入表单工具）
            const surveyData = {
                省份: province,
                城市: city,
                增值税抵减口径: vatRadio.value,
                土增加计扣除口径: landRadio.value,
                补充说明: remark,
                提交时间: new Date().toLocaleString()
            };
            console.log('调研数据', surveyData);
            successDiv.style.display = 'block';
            successDiv.innerHTML = '已收到您的反馈！感谢参与专业调研。财觉说将汇总全国数据并发布分析报告。';
            successDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        });
    })();
</script>
</body>
</html>
